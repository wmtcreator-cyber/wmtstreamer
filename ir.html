<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abrir no navegador | WMT Market</title>
  <style>
    :root{
      --bg:#0a0d12;
      --card:#141c27;
      --line:rgba(255,255,255,.10);
      --text:#ffffff;
      --muted:#b7c4d7;
      --blue:#4d8dff;
      --blue2:#2d74ff;
      --yellow:#f8c94c;
      --yellow2:#ffdf7f;
      --shadow:0 24px 60px rgba(0,0,0,.30);
      --radius:24px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:
        radial-gradient(circle at 10% 0%, rgba(77,141,255,.14), transparent 24%),
        radial-gradient(circle at 90% 0%, rgba(248,201,76,.08), transparent 18%),
        linear-gradient(180deg, #0a0d12 0%, #0e141d 100%);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      padding:16px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wrap{
      width:min(680px, 100%);
    }

    .box{
  position:relative;
  background:linear-gradient(180deg, rgba(20,28,39,.98), rgba(16,23,34,.96));
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
}

  .top-arrow{
  position:absolute;
  top:5px;
  right:35px;
  width:70px;
  height:70px;
  pointer-events:none;
}

.top-arrow::before{
  content:"";
  position:absolute;
  right:3px;
  top:20px;
  width:30px;
  height:30px;
  border-top:5px solid red;
  border-right:5px solid red;
 transform:rotate(-9deg);
}

.top-arrow::after{
  content:"";
  position:absolute;
  right:20px;
  top:34px;
  width:42px;
  height:5px;
  background:red;
  border-radius:999px;
  transform:rotate(-55deg);
  transform-origin:right center;
}

     .wrap{
  background:linear-gradient(180deg, rgba(20,28,39,.98), rgba(16,23,34,.96));
  border-radius:24px;
  padding:18px;
}

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#e8f1ff;
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      margin-bottom:14px;
    }

    h1{
      margin:0;
      font-size:clamp(34px, 8vw, 56px);
      line-height:.95;
      letter-spacing:-.05em;
      text-align:center;
    }

    .sub{
      margin:12px auto 0;
      max-width:520px;
      color:var(--muted);
      font-size:17px;
      line-height:1.55;
      font-weight:700;
      text-align:center;
    }
    .phone-real img{
  width:min(220px, 62vw);
  height:auto;
  display:block;
  background:transparent;
  border:none;
  border-radius:0;
  box-shadow:none;
  filter:none;
}

    .phone-real{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:20px auto 18px;
  padding:0;
  background:transparent;
  border:none;
  border-radius:0;
  box-shadow:none;
}


    .big-action{
      display:block;
      width:100%;
      margin-top:14px;
      border:none;
      border-radius:20px;
      min-height:64px;
      padding:14px 18px;
      cursor:pointer;
      font-size:20px;
      font-weight:900;
      letter-spacing:-.02em;
      transition:.18s ease;
      text-decoration:none;
      text-align:center;
      background:linear-gradient(135deg, var(--blue2), var(--blue));
      color:#fff;
      box-shadow:0 18px 34px rgba(45,116,255,.24);
    }

    .big-action:hover{
      transform:translateY(-1px);
    }

    .link-box{
      margin-top:14px;
      border-radius:20px;
      background:#0d141d;
      border:1px solid rgba(255,255,255,.10);
      padding:14px;
    }

    .link-label{
      font-size:13px;
      color:#d7e4f7;
      font-weight:900;
      letter-spacing:.04em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .link-value{
      width:100%;
      border:none;
      background:transparent;
      color:#fff;
      font-size:15px;
      line-height:1.55;
      font-weight:700;
      outline:none;
    }

    .bottom-help{
      margin-top:16px;
      text-align:center;
      color:#9fb1c9;
      font-size:14px;
      line-height:1.7;
      font-weight:700;
    }

    .ok{
      color:#a8f0c6;
    }

    @media (max-width:640px){
      .box{padding:14px}
      .big-action{
        min-height:58px;
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="box">
      <div class="top-arrow"></div>
      <div class="badge">WMT Market</div>

      <h1>Abra no navegador</h1>
      <div class="sub">Toque nos 3 pontinhos.</div>

      <div class="phone-real">
        <img src="celular.png" alt="Celular mostrando onde clicar" />
      </div>

      <button id="copyBtn" class="big-action" type="button">COPIAR LINK</button>

      <div class="link-box">
        <div class="link-label">Link</div>
        <input id="siteLink" class="link-value" type="text" readonly />
      </div>

      <div id="copyStatus" class="bottom-help">
        Cole no <span class="ok">Chrome</span>, se precisar.
      </div>
    </section>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const targetFromQuery = params.get("to");
    const defaultTarget = "https://wmtcreator-cyber.github.io/wmtstreamer/";
    const target = targetFromQuery && targetFromQuery.trim() ? targetFromQuery.trim() : defaultTarget;
    const ua = navigator.userAgent || "";
const isTikTokWebView =
  /TikTok/i.test(ua) ||
  /musical_ly/i.test(ua) ||
  /bytelocale/i.test(ua);

if (!isTikTokWebView) {
  window.location.replace(target);
}

    const siteLink = document.getElementById("siteLink");
    const copyBtn = document.getElementById("copyBtn");
    const copyStatus = document.getElementById("copyStatus");

    siteLink.value = target;

    async function copyText(){
      try{
        await navigator.clipboard.writeText(target);
        copyStatus.innerHTML = '✅ Link copiado.';
      }catch(e){
        try{
          siteLink.focus();
          siteLink.select();
          siteLink.setSelectionRange(0, 99999);
          const ok = document.execCommand("copy");
          if(ok){
            copyStatus.innerHTML = '✅ Link copiado.';
          }else{
            copyStatus.textContent = "Copie o link manualmente.";
          }
        }catch(err){
          copyStatus.textContent = "Copie o link manualmente.";
        }
      }
    }

    copyBtn.addEventListener("click", copyText);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrando... | WMT Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
  --text:#f5f7fb;
  --muted:#9aa7bb;
  --line:rgba(255,255,255,.08);

  --blue:#6f98ff;
  --blue-2:#4d8dff;
  --blue-3:#2d74ff;
  --green:#58d791;

  --shadow-lg:0 28px 80px rgba(0,0,0,.36);

  --max:720px;
}
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center; padding:18px 14px;
      font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 8% 0%, rgba(122,168,255,.12), transparent 24%),
        radial-gradient(circle at 92% 8%, rgba(88,215,145,.08), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(61,115,239,.10), transparent 28%),
        linear-gradient(rgba(4,7,13,.90), rgba(4,7,13,.96)),
        url('background.jpg') center center / cover no-repeat fixed;
      overflow-x:hidden; position:relative;
    }
    body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(to right, rgba(255,255,255,.010) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.010) 1px, transparent 1px);
  background-size:34px 34px;
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.26), transparent 88%);
  opacity:.18;
}

.card{
  width:min(var(--max),100%);
  position:relative;
  overflow:hidden;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(20,26,34,.96), rgba(15,20,28,.93));
  box-shadow:var(--shadow-lg);
  padding:28px 22px;
  text-align:center;
}
    .card::before{
      content:""; position:absolute; top:-90px; right:-80px; width:220px; height:220px; border-radius:50%;
      background:radial-gradient(circle, rgba(122,168,255,.18), transparent 66%); pointer-events:none;
    }
    .card::after{
      content:""; position:absolute; left:-90px; bottom:-100px; width:220px; height:220px; border-radius:50%;
      background:radial-gradient(circle, rgba(88,215,145,.10), transparent 68%); pointer-events:none;
    }
    .card > *{position:relative; z-index:1}
    .logo{
      width:68px; height:68px; margin:0 auto 16px; border-radius:20px; display:grid; place-items:center;
      color:#fff; font-size:16px; font-weight:800; letter-spacing:.03em;
      background:
        linear-gradient(135deg, rgba(255,255,255,.14), rgba(255,255,255,.02)),
        linear-gradient(135deg, var(--blue), var(--blue-3));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18), 0 16px 28px rgba(61,115,239,.28);
      border:1px solid rgba(255,255,255,.10);
    }
    .badge{
      display:inline-flex; align-items:center; gap:8px; padding:10px 13px; border-radius:999px;
      border:1px solid var(--line); background:rgba(255,255,255,.05); color:#e6efff; font-size:10px;
      font-weight:800; text-transform:uppercase; letter-spacing:.04em; margin-bottom:12px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }
    h1{margin:0 0 10px; font-size:36px; line-height:1.05; letter-spacing:-.03em; color:#fff}
    p{margin:0; color:var(--muted); line-height:1.8; font-size:14px; font-weight:600}
    .status{
      margin-top:18px; padding:14px; border-radius:16px; border:1px solid var(--line);
      background:rgba(255,255,255,.04); color:#dfe7f3; font-size:13px; line-height:1.8; text-align:left;
      display:none;
    }
    .status.error{border-color:rgba(255,107,131,.22); background:rgba(255,107,131,.14); color:#ffe6eb;}
    .status.success{border-color:rgba(89,212,143,.22); background:rgba(88,215,145,.14); color:#e5fff0;}
    .actions{margin-top:16px; display:grid; gap:10px}
    .btn{
      width:100%; border:none; cursor:pointer; border-radius:18px; padding:16px 18px;
      font:800 14px 'Plus Jakarta Sans',system-ui,sans-serif; letter-spacing:.01em; color:#fff; transition:.2s ease;
      min-height:54px;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{
  background:linear-gradient(135deg, #2d74ff, #6f98ff);
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:
    0 18px 30px rgba(45,116,255,.18),
    0 6px 18px rgba(242,201,76,.08);
}

.btn.secondary{
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  color:var(--text);
  border:1px solid var(--line);
}

html,
body{
  overflow-x:hidden;
}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">WMT</div>
    <div class="badge">Acesso</div>
    <h1>Entrando...</h1>
    <p id="desc">Clique no botão abaixo para entrar com sua conta Google e continuar.</p>
    <p id="envHint" style="display:none; margin-top:12px; color:#ffd9a8; line-height:1.7; font-size:13px; font-weight:700;"></p>
    <div class="status" id="statusBox"></div>
    <div class="actions">
      <button class="btn primary" id="openLoginBtn" type="button">ENTRAR COM GOOGLE</button>
      <button class="btn secondary" id="guestBtn" type="button">CONTINUAR SEM LOGIN</button>
      <button class="btn secondary" id="backBtn" type="button">VOLTAR AO INÍCIO</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { isAdminUser } from "./admin-config.js";
    import {
      getAuth,
      GoogleAuthProvider,
      onAuthStateChanged,
      signInWithPopup,
      signOut,
      signInAnonymously,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCXW-LYCPDX5-y-nL4EgcOUdoO6hzPPkJg",
      authDomain: "wmt-market.firebaseapp.com",
      projectId: "wmt-market",
      storageBucket: "wmt-market.firebasestorage.app",
      messagingSenderId: "547032996672",
      appId: "1:547032996672:web:c7bd6a33e43927f003f8a5",
      measurementId: "G-B5X5VD667Y"
    };

    const REDIRECT_KEY = "wmt_after_login";

    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });

    let redirectHandled = false;
    let isSigningIn = false;

    const statusBox = document.getElementById("statusBox");
    const backBtn = document.getElementById("backBtn");
    const guestBtn = document.getElementById("guestBtn");
    const openLoginBtn = document.getElementById("openLoginBtn");
    const desc = document.getElementById("desc");
    const envHint = document.getElementById("envHint");

    function showStatus(message, type = "") {
      statusBox.style.display = "block";
      statusBox.className = "status" + (type ? " " + type : "");
      statusBox.innerHTML = message;
    }

    
    function isEmbeddedBrowser() {
      const ua = navigator.userAgent || "";
      return /Instagram|FBAN|FBAV|Line|MicroMessenger|TikTok|musical_ly|wv|WebView/i.test(ua) ||
        (/iPhone|iPad|iPod/i.test(ua) && !/Safari/i.test(ua));
    }

    function looksLikeGoogleUserAgentError(error) {
      const text = String(error?.code || error?.message || "").toLowerCase();
      return text.includes("disallowed_useragent") || text.includes("useragent") || text.includes("webview") || text.includes("403");
    }

    function updateLoginEnvironmentUI() {
      if (!isEmbeddedBrowser()) return;
      if (envHint) {
        envHint.style.display = "block";
        envHint.innerHTML = "O login Google pode falhar dentro do navegador interno do app. Se der erro, abra este site no Chrome ou Safari.";
      }
      desc.textContent = "Use Google no navegador normal ou continue sem login para enviar sua oferta e abrir chat.";
    }

    function normalizeEmail(value) {
      return String(value || "").trim().toLowerCase();
    }

    function getUserEmail(user) {
      return normalizeEmail(user?.email || "");
    }


    function getRedirectTarget() {
      return localStorage.getItem(REDIRECT_KEY) || sessionStorage.getItem(REDIRECT_KEY) || "enviar.html";
    }

    function clearRedirectTarget() {
      localStorage.removeItem(REDIRECT_KEY);
      sessionStorage.removeItem(REDIRECT_KEY);
    }

    function goToTarget(target) {
      window.location.href = target;
    }

    function processRedirect(user) {
      if (redirectHandled || !user) return;
      redirectHandled = true;

      const target = getRedirectTarget();
      clearRedirectTarget();

      if (target.includes("painel.html") && !isAdminUser(user)) {
        showStatus("<strong>Acesso restrito.</strong><br>Sua conta não tem permissão para entrar no painel. Você será enviado para a área de envio.", "error");
        setTimeout(() => goToTarget("enviar.html"), 900);
        return;
      }

      showStatus("<strong>Login concluído.</strong><br>Redirecionando para sua página...", "success");
      setTimeout(() => goToTarget(target), 250);
    }

    async function openLogin() {
      if (isSigningIn) return;

      isSigningIn = true;
      openLoginBtn.disabled = true;
      openLoginBtn.textContent = "ABRINDO GOOGLE...";
      desc.textContent = "Confirme seu login com Google para continuar.";

      try {
        await setPersistence(auth, browserLocalPersistence);
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error(err);

        if (err?.code === "auth/popup-closed-by-user") {
          showStatus("<strong>Login cancelado.</strong><br>Você fechou a janela antes de concluir o acesso.", "error");
        } else if (err?.code === "auth/popup-blocked") {
          showStatus("<strong>Popup bloqueado.</strong><br>Permita popups para este site e tente novamente.", "error");
        } else if (err?.code === "auth/unauthorized-domain") {
          showStatus("<strong>Domínio não autorizado.</strong><br>Adicione seu domínio atual em Firebase Authentication → Settings → Authorized domains.", "error");
        } else if (looksLikeGoogleUserAgentError(err)) {
          showStatus("<strong>Google bloqueou este login neste navegador.</strong><br>Abra o site no Chrome ou Safari, ou toque em <strong>Continuar sem login</strong> para seguir com sessão temporária.", "error");
        } else {
          showStatus("<strong>Erro no login.</strong><br>" + (err?.message || "Tente novamente."), "error");
        }
      } finally {
        isSigningIn = false;
        openLoginBtn.disabled = false;
        openLoginBtn.textContent = "ENTRAR COM GOOGLE";
      }
    }

    async function continueAsGuest() {
      if (isSigningIn) return;

      isSigningIn = true;
      guestBtn.disabled = true;
      guestBtn.textContent = "ENTRANDO...";

      try {
        await setPersistence(auth, browserLocalPersistence);
        if (!auth.currentUser) {
          await signInAnonymously(auth);
        }
        const target = getRedirectTarget();
        clearRedirectTarget();
        showStatus("<strong>Sessão temporária criada.</strong><br>Redirecionando...", "success");
        setTimeout(() => goToTarget(target), 250);
      } catch (err) {
        console.error(err);
        showStatus("<strong>Erro ao continuar sem login.</strong><br>" + (err?.message || "Tente novamente."), "error");
      } finally {
        isSigningIn = false;
        guestBtn.disabled = false;
        guestBtn.textContent = "CONTINUAR SEM LOGIN";
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (user && !user.isAnonymous) {
        processRedirect(user);
      }
    });

    openLoginBtn.addEventListener("click", () => {
      redirectHandled = false;
      statusBox.style.display = "none";
      openLogin();
    });

    guestBtn.addEventListener("click", () => {
      redirectHandled = false;
      statusBox.style.display = "none";
      continueAsGuest();
    });

    backBtn.addEventListener("click", async () => {
      clearRedirectTarget();
      try {
        if (auth.currentUser) {
          await signOut(auth);
        }
      } catch (error) {
        console.error(error);
      } finally {
        goToTarget("index.html");
      }
    });

    // Se já estiver logado com conta real, entra direto
    if (auth.currentUser && !auth.currentUser.isAnonymous) {
      processRedirect(auth.currentUser);
    }

    updateLoginEnvironmentUI();
  </script>
</body>
</html>
